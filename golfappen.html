<!doctype html>
<html lang="sv">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="fullscreen, width=device-width, height=device-height, initial-scale=1.0, interactive-widget=resizes-content">
    <!-- <link rel="stylesheet" href="style/style.css"> -->
    <link rel="preconnect" href="assets/golf_ball.glb">
    <link rel="preconnect" href="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
    <link rel="stylesheet" href="style/golfappen.css">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Golfappen | 7rip7ych</title>
    <meta name="description" content="En app för att hålla koll på golf poäng">
</head>

<body>
    <header class="siteheader">
        <div class="logo">
            <a href="#hem">
                <!-- <img src="img/onepage/mushroom-glowin.svg" alt="Logo"> -->
                <model-viewer
                    src="assets/golf_ball.glb"
                    alt="golf ball"
                    shadow_intensity="1"
                    auto-rotate
                    rotation-per-second="0.15rad"
                    camera-orbit="0deg 140deg 105%"
                    auto-rotate-delay="10"></model-viewer>
                <span>Golfappen</span>
            </a>
        </div>

        <nav class="navbar">
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="#collage">Kollage</a></li>
            </ul>
        </nav>
    </header>

    <div class="wrapper">
        <section id="startView" class="transparent visible">
            <div class="row cols-1 no-padding">
                <div class="col centered-rows">
                    <div class="row">
                        <model-viewer
                        src="assets/golf_ball.glb"
                        alt="golf ball"
                        shadow_intensity="1"
                        auto-rotate
                        rotation-per-second="0.1rad"
                        camera-orbit="0deg 120deg 105%"
                        auto-rotate-delay="10"
                        ></model-viewer>
                    </div>
                    

                    <h3 class="row centered">Golfappen</h3>

                    <button class="row centered main-button" id="newGame">Nytt spel</button>

                    <button class="row centered main-button" id="continueGame">Fortsätt senaste spel</button>
                    <button class="row centered main-button" id="showHistory">Historik</button>
                </div>
            </div>

        </section>

        <section id="newView" class="hidden">
            <button class="back-button navigation-button">&lt; Tillbaka</button>
            <h2>Nytt spel</h2>
            <form id="newGameForm" class="form">
                <label>Antal spelare:
                <input type="number" min="1" max="1000" value="2" id="playerCount" name="players" required>
                </label>

                <label>Antal hål:
                <input type="number" min="1" max="18" value="18" id="holeCount" name="holes" required>
                </label>
                
                <select id="gameType" name="type" required>
                    <option value="" selected disabled>Välj speltyp</option>
                </select>

                <!-- <select id="golfCourse" name="course">
                    <option selected disabled>Välj bana (optionellt)</option>
                </select> -->

                <input type="submit" name="submit">
            </form>
        </section>

        <section id="playersView" class="hidden">
            <button class="back-button navigation-button">&lt; Tillbaka</button>
            <h2>Ange spelare</h2>
            <form class="form" id="playerForm"></form>
        </section>

        <section id="playView" class="hidden">
            <button class="back-button navigation-button">&lt; Tillbaka</button>
            <h2>Poängräknare</h2>
            <div id="keeper-nav" class="separating-row-flex white">
                <span>&lt;</span>
                <span>&gt;</span>
            </div>
            <form class="cols-1 rounded white step-scroll" id="scoreKeeper">
                <div class="col white">
                    <h3>Hål 1</h3>

                    <label>Player 1: <input type="number"></label>
                    <label>Player 2: <input type="number"></label>

    <header class="siteheader">
        <div class="logo">
            <a href="#hem">
                <!-- <img src="img/onepage/mushroom-glowin.svg" alt="Logo"> -->
                <model-viewer
                    src="assets/golf_ball.glb"
                    alt="golf ball"
                    shadow_intensity="1"
                    auto-rotate
                    rotation-per-second="0.15rad"
                    camera-orbit="0deg 140deg 105%"
                    auto-rotate-delay="10"></model-viewer>
                <span>Golfappen</span>
            </a>
        </div>

        <nav class="navbar">
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="#collage">Kollage</a></li>
            </ul>
        </nav>
    </header>

    <div class="wrapper">
        <section id="hem" class="transparent">

            <div class="row cols-1 no-padding">
                <div class="col centered-rows">
                    <model-viewer
                    src="assets/golf_ball.glb"
                    alt="golf ball"
                    shadow_intensity="1"
                    auto-rotate
                    rotation-per-second="0.1rad"
                    camera-orbit="0deg 120deg 105%"
                    auto-rotate-delay="10"
                    class="row"
                    ></model-viewer>

                    <h3 class="row centered">Golfappen</h3>

                    <button class="row centered main-button" id="newGame">Nytt spel</button>

                    <button class="row centered main-button" id="continueGame">Fortsätt senaste spel</button>
                </div>
            </div>

        </section>

        <section id="new" class="hidden">
            <form id="newGameForm">
                <label for="players">Antal spelare:</label>
                <input type="number" min="1" max="1000" value="2" id="playerCount" name="players">
                <br>
                <label for="holes">Antal hål:</label>
                <input type="number" min="1" max="18" value="18" id="holeCount" name="holes">

                <!-- <label for="">Speltyp</label> -->
                <select id="gameType">
                    <option selected disabled>Välj speltyp</option>
                </select>

                <select id="golfCourse">
                    <option selected disabled>Välj bana (optionellt)</option>
                </select>
            </form>
        </section>

    </div>


    <footer class="sitefooter">
        <div class="footer-triptych row cols-3">
